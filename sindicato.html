<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparencia - Sindicato Jalpan de Serra (STSMJ)</title>
    <style>
        :root {
            --primary: #1b4332;
            --secondary: #2d6a4f;
            --accent: #52b788;
            --bg: #f8f9fa;
            --footer-bg: #081c15;     
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; background-color: var(--bg); color: #333; margin: 0; padding: 0; }
        
        .page-container {
            max-width: 1100px;
            margin: 0 auto 40px auto;
            background: white;
            padding-bottom: 20px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header-banner { width: 100%; height: auto; display: block; border-bottom: 4px solid var(--primary); }

        .image-center-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 40px;
        }
        .image-center-group a { 
            display: block; 
            max-width: 45%; 
            transition: transform 0.2s ease;
        }
        .image-center-group a:hover {
            transform: scale(1.02);
        }
        .image-center-group img { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
        }

        header { text-align: center; padding: 20px 40px 10px 40px; }
        h1 { margin: 0; color: var(--primary); font-size: 2.5rem; text-transform: uppercase; }
        .subtitulo-main { color: var(--secondary); font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; }
        
        h2 { 
            color: var(--primary); 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 5px; 
            margin: 40px 40px 10px 40px; 
            font-size: 1.8rem;
        }

        .articulo-card { border: 1px solid #ddd; margin: 0 40px 12px 40px; border-radius: 8px; transition: all 0.3s ease; }
        .articulo-header { 
            padding: 18px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff; 
            color: var(--primary); 
        }
        .articulo-header:hover { background: #f0f7f4; }

        .numero-fraccion { font-size: 1.25rem; font-weight: 800; margin-right: 10px; color: var(--secondary); }
        .titulo-fraccion { font-size: 1.05rem; font-weight: 600; }

        .articulo-body { display: none; padding: 20px; background: #fafafa; border-top: 1px solid #e0e0e0; }
        .active .articulo-body { display: block; }
        .active .articulo-header { background: #f0f7f4; border-bottom: 1px solid #e0e0e0; }

        .panel-opciones { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        
        .btn-interactivo, .btn-directo { 
            background: var(--primary); color: white; padding: 8px 16px; border-radius: 5px; 
            text-decoration: none; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; border: none;
            transition: background 0.2s;
        }
        .btn-interactivo:hover, .btn-directo:hover { background: var(--secondary); }

        .no-aplica { color: #888; font-style: italic; background: #eee; padding: 5px 12px; border-radius: 4px; font-size: 0.9rem; }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
        }
        .modal-content {
            background-color: white; margin: 5% auto; padding: 30px; border-radius: 12px;
            width: 80%; max-width: 600px; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { margin: 0; color: var(--primary); }
        .close-modal { font-size: 28px; font-weight: bold; cursor: pointer; color: #aaa; }
        .close-modal:hover { color: var(--secondary); }

        .descargas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .año-seccion { grid-column: 1 / -1; background: #eef2f0; padding: 8px 15px; font-weight: bold; color: var(--primary); border-radius: 4px; margin-top: 15px; }
        .btn-descarga {
            display: flex; justify-content: space-between; align-items: center; background: white;
            border: 1px solid #ddd; padding: 12px; border-radius: 6px; text-decoration: none; color: #333; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-descarga:hover { border-color: var(--accent); background: #f0f7f4; transform: translateY(-2px); }
        .btn-descarga span { font-weight: bold; color: var(--secondary); font-size: 0.75rem; border: 1px solid var(--secondary); padding: 2px 4px; border-radius: 3px; }

        footer { background-color: var(--footer-bg); color: white; text-align: center; padding: 40px 20px; margin-top: 40px; }
        .footer-bold { font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="image-center-group">

        { id: "XXVI", titulo: "Concesiones", desc: "Concesiones, contratos, convenios y permisos.", fecha: "17/04/2026", opciones: ["Concesiones, contratos, convenios, permisos otorgados"] },

        { id: "XXXIII", titulo: "Inventario de Bienes", desc: "Bienes muebles, inmuebles y donaciones.", fecha: "17/04/2026", opciones: ["Bienes muebles", "Bienes inmuebles"] },
        { id: "XXXIV", titulo: "Derechos Humanos", desc: "Recomendaciones de organismos garantes.", fecha: "17/04/2026", opciones: [] },

        { id: "XL", titulo: "Estudios", desc: "Estudios financiados con recursos públicos.", fecha: "17/04/2026", opciones: ["Estudios financiados"] },

    ];

    const datosArt77 = [
        { id: "I", titulo: "Convenios", desc: "Contratos y convenios.", fecha: "17/04/2026", opciones: ["Convenios"] },
        { id: "II", titulo: "Comité Ejecutivo", desc: "Directorio.", fecha: "19/01/2026", opciones: ["Directorio"] },
        { id: "III", titulo: "Padrón de Socios", desc: "Padrón actualizado.", fecha: "17/04/2026", opciones: ["Padrón de socios"] },
        { id: "IV", titulo: "Recursos Públicos", desc: "Relación de recursos económicos.", fecha: "17/04/2026", opciones: ["Recursos económicos"] }
    ];

    function abrirModal(nombreDoc) {
        const modal = document.getElementById("miModal");
        const cuerpo = document.getElementById("modalCuerpo");
        const titulo = document.getElementById("modalTitulo");

        titulo.innerText = `Archivo: ${nombreDoc}`;
        cuerpo.innerHTML = ""; 

        const añoActual = 2026;
        let tReferenciaTope = 1; 
        let añoInicio = 2022;

        if (nombreDoc === "Estructura orgánica" || nombreDoc === "Organigrama") {
            tReferenciaTope = 1; 
        }
        
        // Se añade Estatutos Internos al rango que inicia en 2020
        if (nombreDoc === "Organigrama" || nombreDoc === "Metas y Objetivos" || nombreDoc === "Estatutos Internos") {
            añoInicio = 2020;
        }

        for (let año = añoActual; año >= añoInicio; año--) {
            const labelAño = document.createElement("div");
            labelAño.className = "año-seccion";
            labelAño.innerText = `Ejercicio ${año}`;
            cuerpo.appendChild(labelAño);

            let tFin = (año === añoActual) ? tReferenciaTope : 4;
            let tInicio = 1;
            
            // Ajuste para documentos que solo existen desde el T2 de 2022 (excepto los históricos)
            if (año === 2022 && (nombreDoc !== "Organigrama" && nombreDoc !== "Metas y Objetivos" && nombreDoc !== "Estatutos Internos")) tInicio = 2;

            for (let t = tFin; t >= tInicio; t--) {
                const btn = document.createElement("a");
                btn.className = "btn-descarga";
                let extShow = "XLSX"; 
                
                // --- LÓGICA DE ORGANIGRAMA ---
                if (nombreDoc === "Organigrama") {
                    let nomFile = "";
                    if ((año === 2026 && t === 1) || (año === 2025) || (año === 2024) || (año === 2023) || (año === 2022 && t >= 2)) {
                        nomFile = `LTAIPEQArt66FraccIIB.T${t}${año.toString().slice(-2)}.xlsx`;
                        extShow = "XLSX";
                    } else if (año === 2022 && t === 1) {
                         nomFile = "ORGANIGRAMA_COMITE_2021-2024.pdf";
                         extShow = "PDF";
                    } else if (año === 2021 && t === 4) {
                        nomFile = "ORGANIGRAMA_COMITE_2021-2024.pdf";
                        extShow = "PDF";
                    } else if ((año === 2021 && t <= 3) || (año === 2020)) {
                        nomFile = "organigrama_del_stsmj.pdf";
                        extShow = "PDF";
                    }
                    btn.href = nomFile || "#";
                    if(nomFile) btn.setAttribute("download", nomFile);
                }
                // --- LÓGICA DE METAS Y OBJETIVOS ---
                else if (nombreDoc === "Metas y Objetivos") {
                    let nomFile = "";
                    if ((año === 2020) || (año === 2021) || (año === 2022 && t === 1)) {
                        nomFile = "OBJETIVOS-Y-METAS-INSTITUCIONALES-DEL-STSMJ.pdf";
                        extShow = "PDF";
                    } else if ((año === 2022 && t >= 2) || (año === 2023) || (año === 2024) || (año === 2025) || (año === 2026 && t === 1)) {
                        nomFile = `LTAIPEQArt66FraccIIIB.T${t}${año.toString().slice(-2)}.xlsx`;
                        extShow = "XLSX";
                    }
                    btn.href = nomFile || "#";
                    if(nomFile) btn.setAttribute("download", nomFile);
                }
                // --- LÓGICA DE ESTATUTOS INTERNOS (NUEVA ACTUALIZACIÓN) ---
                else if (nombreDoc === "Estatutos Internos") {
                    let nomFile = "";
                    // Histórico PDF (2020-T1 al 2022-T1)
                    if ((año === 2020) || (año === 2021) || (año === 2022 && t === 1)) {
                        nomFile = "ESTATUTOS-INTERNOS-DEL-S.T.S.M.J..pdf";
                        extShow = "PDF";
                    } 
                    // XLSX (2022-T2 al 2026-T1)
                    else if ((año === 2022 && t >= 2) || (año === 2023) || (año === 2024) || (año === 2025) || (año === 2026 && t === 1)) {
                        nomFile = `LTAIPEQArt66FraccIIIA.T${t}${año.toString().slice(-2)}.xlsx`;
                        extShow = "XLSX";
                    }
                    btn.href = nomFile || "#";
                    if(nomFile) btn.setAttribute("download", nomFile);
                }
                // --- LÓGICA DE ESTRUCTURA ORGÁNICA ---
                else if (nombreDoc === "Estructura orgánica") {
                    if (año === 2022) {
                        if (t === 2) btn.href = "LTAIPEQArt66FraccIIA.xlsx";
                        else if (t === 3) btn.href = "LTAIPEQArt66-FraccIIA.xlsx";
                        else if (t === 4) btn.href = "LTAIPEQArt66FraccIIA..xlsx";
                    } else if (año >= 2023) {
                        btn.href = `LTAIPEQArt66FraccIIA.T${t}${año.toString().slice(-2)}.xlsx`;
                    }
                    btn.setAttribute("download", btn.href);
                } 
                else {
                    btn.href = "#";
                }

                btn.innerHTML = `Trimestre ${t} <span>${extShow}</span>`;
                
                if (btn.getAttribute("href") === "#") {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        alert(`El archivo solicitado para ${nombreDoc} (${año}-T${t}) no está disponible.`);
                    };
                }
                cuerpo.appendChild(btn);
            }
        }
        modal.style.display = "block";
    }

    function cerrarModal() { document.getElementById("miModal").style.display = "none"; }
    window.onclick = function(event) { if (event.target == document.getElementById("miModal")) cerrarModal(); }

    function generarHTML(lista, contenedorId) {
        const contenedor = document.getElementById(contenedorId);
        lista.forEach(item => {
            const div = document.createElement('div');
            div.className = 'articulo-card';
            const botones = item.opciones.length > 0 ? item.opciones.map(op => {
                if (op === "Tabla de aplicabilidad") return `<a href="TABLA_ARTICULOS_66_Y_77.xlsx" download class="btn-directo">📊 Descargar Tabla (.xlsx)</a>`;
                if (op === "Marco normativo") return `<a href="LTAIPEQArt66FraccI.xlsx" download class="btn-directo">⚖️ Descargar Marco Normativo (.xlsx)</a>`;
                return `<button class="btn-interactivo" onclick="event.stopPropagation(); abrirModal('${op}')">📄 ${op}</button>`;
            }).join('') : '<span class="no-aplica">No Aplica</span>';
            
            const tagFraccion = item.id !== 'Tabla' ? `<span class="numero-fraccion">Fracción ${item.id}.</span>` : '';
            div.innerHTML = `<div class="articulo-header" onclick="this.parentElement.classList.toggle('active')"><div>${tagFraccion}<span class="titulo-fraccion">${item.titulo}</span></div><span>▼</span></div><div class="articulo-body"><span style="font-size: 0.8rem; color: #666; display:block; margin-bottom:10px;">Actualización: ${item.fecha}</span><p>${item.desc}</p><div class="panel-opciones">${botones}</div></div>`;
            contenedor.appendChild(div);
        });
    }

    generarHTML(datosArt66, 'contenedor-art66');
    generarHTML(datosArt77, 'contenedor-art77');
</script>
</body>
</html>
